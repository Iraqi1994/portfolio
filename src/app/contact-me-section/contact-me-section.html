<h1>Contact Me</h1>
<div class="description-contact-info">
  <div class="description">
    Lorem ipsum dolor sit amet consectetur adipisicing elit. Ab nulla voluptate cum? Quo quis neque
    culpa delectus quibusdam quam libero vero illo quae cupiditate. Impedit eum ipsa vel quo
    suscipit.
  </div>
  <div class="contact-info">
    <div>Email: h.iraqi@web.de</div>
    <div>Tel: +49 179 109 69 92</div>
  </div>
</div>
<div class="form-wrapper">
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <div class="input-row">
      <div>
        <label for="name">Your name</label>
        <input type="text" id="name" formControlName="name" required />
      </div>
      <div>
        <label for="email">Your email</label>
        <input type="email" id="email" formControlName="email" required />
      </div>
    </div>
    <div>
      <label for="message">Your message</label>
      <textarea id="message" formControlName="message" rows="5" required></textarea>
    </div>
    <div class="checkbox-wrapper">
      <input type="checkbox" id="privacy" formControlName="privacy" required />
      <label for="privacy">
        <span class="checkbox-custom"></span>
        <span class="checkbox-text"
          >I've read the privacy policy and agree to the processing of my data as outlined.</span
        >
      </label>
    </div>
    <button
      type="submit"
      [style.color]="contactForm.valid ? '#89bcd9' : '#8f9290'"
      [style.border-color]="contactForm.valid ? '#89bcd9' : '#8f9290'"
    >
      Send
    </button>
  </form>
</div>
